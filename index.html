                "new glasses": [
                    `I had been putting off getting a new pair of glasses for months until my old ones finally broke. I decided to drop by ${SHOP_NAME} based on a friend's recommendation, and I am so incredibly glad I did.\n\nThe collection of frames they have is massive, covering all price ranges and the latest styles. The staff was super patient and spent a good half hour helping me try on different looks until I found the perfect one. What impressed me the most was their modern eye-testing facility, which felt very accurate, and the optometrist took the time to explain my prescription changes.\n\nTo top it all off, the delivery was fast and the fit was absolutely perfect on the first try. I highly recommend this shop to everyone looking for quality eyewear and great service.`,

                    `I recently shifted to this area and was looking for a good place to get my power glasses updated. Stumbling upon ${SHOP_NAME} was the best thing that could have happened for my vision.\n\nThey have an extensive collection of branded frames, making it easy to browse and find what you like. The store manager personally assisted me, giving honest opinions on which frame suited my face structure rather than just pushing expensive products. The eye exam was thorough and not rushed at all.\n\nThe final glasses I received feel extremely lightweight and the lens quality is fantastic. 5 out of 5 stars for their professionalism and friendly attitude!`,

                    `I was in a huge panic yesterday when my only pair of glasses broke right before an important meeting. I rushed into ${SHOP_NAME} hoping they could do something to help me out urgently.\n\nThe staff immediately understood my situation and prioritized my order without any hesitation. They quickly did a fresh eye test just to be absolutely sure, helped me select a professional frame, and sent it for fitting right away. The whole process was incredibly smooth, well-coordinated, and stress-free.\n\nUnbelievably, I had my brand new glasses ready in just 10 minutes! The speed and quality of their service are truly unmatched. You saved my day!`,

                    `If you ever need glasses made urgently, look no further than ${SHOP_NAME}. I was traveling out of town the next day and needed a backup pair immediately.\n\nI walked in and explained my tight schedule. The team was fantastic—they guided me straight to a section of frames that fit my budget and got my eye testing done in the blink of an eye. There was no compromise on the thoroughness of the checkup despite the rush.\n\nThey handed me my new spectacles in under 10 minutes. The lenses are crystal clear and the frame sits perfectly. Absolutely stellar service!`,

                    `I have been to many optical shops over the years, but the speed of service at ${SHOP_NAME} blew my mind. I came in expecting the usual 2-day wait for new prescription glasses.\n\nInstead, they took my eye measurements using their advanced machines and told me to just wait for a few minutes. While I was checking out the other frames, they were already cutting and fitting my lenses. The staff is highly trained and works with amazing efficiency.\n\nGot my glasses in 10 minutes flat. Highly recommend this place if you value your time and want premium quality work.`,

                    `A genuinely 5-star experience! I accidentally sat on my glasses and needed an immediate replacement for my daily work.\n\n${SHOP_NAME} handled my emergency perfectly. The staff attended to me right away, showing great empathy. They did a quick but accurate eye check and helped me pick a durable frame that I absolutely love.\n\nThe 10-minute delivery promise is real. The quality is superb, and I didn't have to spend a fortune. Best optical service in the city!`,

                    `If you value your time and hate waiting days for new prescription glasses, ${SHOP_NAME} is the only place you should visit. I needed a spare pair before a long business trip and was incredibly short on time.\n\nI explained my urgency to the staff, and they were phenomenally accommodating. They bypassed the usual wait times, instantly conducted a thorough eye check, and sent the selected frame for immediate lens fitting right there in the shop.\n\nI had the glasses in my hands in exactly 10 minutes. The quality is brilliant, and the service is unmatched. Highly, highly recommended.`,

                    `Getting an eye exam is usually a standard, boring affair, but the team at ${SHOP_NAME} makes it a great experience. The process is very smooth and efficient.\n\nThe doctor was very thorough, explaining every step of the vision test and why my prescription had slightly changed over the past year. They made sure I was completely comfortable with the new trial lenses before finalizing the power. \n\nI really appreciated their transparency and expertise. If you feel your vision is getting blurry, this is the right place to get tested accurately.`,

                    `I took my 8-year-old child here for their first proper eye exam, and the staff handled it beautifully. ${SHOP_NAME} is incredibly family-friendly.\n\nThe optometrist was so gentle and patient, turning the eye test into a fun game so my child wouldn't get scared. They meticulously checked the eye health and provided great advice on reducing screen time and maintaining good habits.\n\nIt is rare to find such dedicated professionals who genuinely care about their patients. 10/10 experience!`,

                    `I went to ${SHOP_NAME} for a second opinion on my eye number because my previous glasses from another store were giving me blurry vision.\n\nThe eye specialist here immediately identified the issue with the axis in my old prescription. They conducted a very detailed computerized and manual eye exam to find my exact visual requirements. The level of detail they go into is highly impressive.\n\nGot my new lenses made from them, and my vision has never been sharper. Trust them blindly for your eye exams.`,

                    `Lately, I had been experiencing a lot of dryness and fatigue in my eyes after long hours of coding. I decided to drop by ${SHOP_NAME} for a comprehensive eye checkup to see what was going wrong.\n\nThe specialist took the time to listen to my daily routine before even starting the exam. They conducted a meticulous checkup, identified a slight astigmatism I didn't know I had, and recommended specialized blue-cut lenses to ease the strain.\n\nI appreciate how detailed and transparent the entire consultation was. This is by far the most professional eye exam I have ever had.`,

                "fast service": [

                "eye exam": [

                    `माझा नवीन चष्मा कानामागे खूप घट्ट बसत होता ज्यामुळे मला सतत त्रास होत होता. मी फिटिंग ऍडजस्ट करण्यासाठी ${SHOP_NAME} मध्ये गेलो.\n\nऑप्टोमेट्रिस्टने लगेच माझी अडचण ओळखली आणि नोज-पॅड्स व कानाजवळची फ्रेम व्यवस्थित ऍडजस्ट केली. जोपर्यंत मला तो चष्मा चेहऱ्यावर हलका वाटत नाही तोपर्यंत त्यांनी काळजीपूर्वक बदल केले.\n\nफ्रेम परफेक्ट ऍडजस्ट करण्यासाठी खूप कौशल्य लागते, आणि येथील टीमला ते नक्कीच अवगत आहे. खूप छान आणि जलद सर्व्हिस!`,

                    `माझ्या आवडत्या सनग्लासचा एक स्क्रू पडला होता. मी तो दुरुस्त करण्यासाठी ${SHOP_NAME} मध्ये घेऊन गेलो.\n\nत्यांनी फक्त स्क्रूच लावून दिला नाही, तर सर्व बिजागरी घट्ट केल्या आणि मशीनने लेन्सेस एकदम मोफत स्वच्छ करून दिल्या! स्टाफ खूप नम्र होता आणि त्यांनी माझ्या महागड्या फ्रेमची योग्य काळजी घेतली.\n\nमाझा जुना गॉगल आता एकदम नवीन वाटत आहे. त्यांच्या या प्रामाणिक आणि उत्तम सर्व्हिसचे मी खूप कौतुक करतो.`,

                    `मी खाली बघताना माझा चष्मा सतत नाकावरून खाली घसरत होता, ज्यामुळे मला खूप कंटाळा येत होता. म्हणून मी ${SHOP_NAME} मध्ये गेलो.\n\nदुकानातील टेक्निशियन खूप प्रोफेशनल होते. त्यांनी माझ्या चष्म्याचा ब्रिज आणि मागचा भाग थोडा ऍडजस्ट केला. या संपूर्ण प्रक्रियेला फक्त ५ मिनिटे लागली, पण त्यामुळे मला आता खूप आराम मिळाला आहे.\n\nआफ्टर-सेल्स सर्व्हिस अतिशय उत्तम आहे. मी माझा पुढचा चष्मा नक्कीच यांच्याकडून विकत घेणार.`
                ]
            };

            // --- SHUFFLE LOGIC ---
            const getUniqueItems = (pool, count) => {
                const shuffled = [...pool];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                return shuffled.slice(0, count);
            };

            const generateReviews = (serviceType) => {
                // Get 5 Unique English Reviews
                const ePool = englishReviews[serviceType] || englishReviews["new glasses"];
                const selectedEnglish = getUniqueItems(ePool, 5);

                // Get 1 Unique Marathi Review
                const mPool = marathiReviews[serviceType] || marathiReviews["new glasses"];
                const selectedMarathi = getUniqueItems(mPool, 1);

                // Combine them
                const combined = [...selectedEnglish, ...selectedMarathi];

                // Shuffle the final array so the Marathi review isn't always at the bottom
                return getUniqueItems(combined, 6);
            };

            // Event Handlers
            const handleServiceSelect = (selected) => {
                setService(selected);
                setStep(2);

                // Simulated thinking delay for UX
                setTimeout(() => {
                    setGeneratedOptions(generateReviews(selected));
                    setStep(3);
                }, 1000);
            };

            const handleCopyAndRedirect = (text, index) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopiedIndex(index);
                    setTimeout(() => {
                        window.open(GOOGLE_REVIEW_LINK, '_blank');
                    }, 1000);
                } catch (err) {
                    alert("Please manually copy the text, then we will open Google Maps!");
                    window.open(GOOGLE_REVIEW_LINK, '_blank');
                }
                document.body.removeChild(textArea);
            };

            const handleReset = () => {
                setStep(1);
                setCopiedIndex(null);
            };

            return (
                <div className="min-h-screen flex justify-center">
                    <div className="w-full max-w-md bg-white shadow-xl min-h-screen flex flex-col">

                        {/* Header */}
                        <header className="bg-blue-600 p-6 text-white rounded-b-3xl shadow-lg z-10 relative overflow-hidden">
                            <div className="absolute top-0 right-0 -mt-4 -mr-4 opacity-20">
                                <Glasses size={120} />
                            </div>
                            <h1 className="text-2xl font-bold flex items-center gap-2 relative z-10">
                                {SHOP_NAME}
                            </h1>
                            <p className="text-blue-100 text-sm mt-1 relative z-10">
                                Detailed Review Generator
                            </p>
                        </header>

                        <main className="flex-1 p-6 flex flex-col relative">

                            {/* STEP 1: Select Service */}
                            {step === 1 && (
                                <div className="animate-fade-in">
                                    <h2 className="text-xl font-semibold mb-2 text-slate-800">
                                        How was your visit?
                                    </h2>
                                    <p className="text-slate-500 mb-6 text-sm">
                                        Select an option to generate your review.
                                    </p>

                                    <div className="grid grid-cols-1 gap-3">
                                        <ServiceButton icon={<Glasses size={24} />} iconColor="text-blue-600 bg-blue-50" label="New Glasses" onClick={() => handleServiceSelect("new glasses")} />
                                        <ServiceButton icon={<Zap size={24} />} iconColor="text-amber-600 bg-amber-50" label="Fast Service (10 min)" onClick={() => handleServiceSelect("fast service")} />
                                        <ServiceButton icon={<Eye size={24} />} iconColor="text-emerald-600 bg-emerald-50" label="Eye Exam" onClick={() => handleServiceSelect("eye exam")} />
                                        <ServiceButton icon={<Sun size={24} />} iconColor="text-orange-600 bg-orange-50" label="Sunglasses" onClick={() => handleServiceSelect("sunglasses")} />
                                        <ServiceButton icon={<Sparkles size={24} />} iconColor="text-purple-600 bg-purple-50" label="Frame Adjustment" onClick={() => handleServiceSelect("frame adjustment")} />
                                    </div>
                                </div>
                            )}

                            {/* STEP 2: Loading Animation */}
                            {step === 2 && (
                                <div className="flex-1 flex flex-col items-center justify-center text-center animate-fade-in">
                                    <div className="relative">
                                        <div className="w-16 h-16 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-4"></div>
                                        <div className="absolute inset-0 flex items-center justify-center text-blue-600">
                                            <Sparkles size={24} className="animate-pulse" />
                                        </div>
                                    </div>
                                    <h3 className="text-lg font-semibold text-slate-700">Writing detailed reviews...</h3>
                                    <p className="text-slate-400 text-sm mt-2">Crafting human-like, high-quality feedback.</p>
                                </div>
                            )}

                            {/* STEP 3: Choose Review */}
                            {step === 3 && (
                                <div className="animate-slide-up pb-20">
                                    <div className="flex items-center justify-between mb-4">
                                        <h2 className="text-xl font-semibold text-slate-800">
                                            Tap to Select
                                        </h2>
                                        <button onClick={handleReset} className="text-xs font-medium text-slate-400 hover:text-blue-600 uppercase tracking-wide">
                                            Back
                                        </button>
                                    </div>

                                    <p className="text-slate-500 text-xs mb-4 flex gap-2 items-center">
                                        <Check size={14} className="text-green-500" />
                                        Select one to copy & open Maps automatically.
                                    </p>

                                    <div className="space-y-4">
                                        {generatedOptions.map((text, idx) => (
                                            <div key={idx} className={`relative p-5 rounded-xl border-2 transition-all duration-300 shadow-sm ${copiedIndex === idx ? 'border-green-500 bg-green-50 transform scale-[1.02]' : 'border-slate-100 bg-white hover:border-blue-300 active:border-blue-500'}`}>
                                                {copiedIndex === idx && (
                                                    <div className="absolute -top-3 -right-2 bg-green-500 text-white text-xs font-bold px-3 py-1 rounded-full shadow-md flex items-center gap-1 animate-bounce">
                                                        <Check size={12} /> COPIED
                                                    </div>
                                                )}
                                                <div className="flex gap-1 text-amber-400 mb-4">
                                                    {[1, 2, 3, 4, 5].map(i => <Star key={i} size={14} fill="currentColor" />)}
                                                    <span className="text-xs text-slate-400 ml-2 font-medium uppercase tracking-wide pt-0.5">
                                                        {/[\u0900-\u097F]/.test(text) ? "Marathi" : "English"}
                                                    </span>
                                                </div>

                                                {/* Render multiple paragraphs neatly */}
                                                <div className="text-slate-700 text-sm leading-relaxed mb-5 space-y-3">
                                                    {text.split('\n\n').map((paragraph, pIdx) => (
                                                        <p key={pIdx}>{paragraph}</p>
                                                    ))}
                                                </div>

                                                <button onClick={() => handleCopyAndRedirect(text, idx)} className={`w-full py-3 rounded-lg font-semibold text-sm flex items-center justify-center gap-2 transition-colors ${copiedIndex === idx ? 'bg-green-500 text-white' : 'bg-slate-900 text-white hover:bg-blue-600 active:bg-blue-700'}`}>
                                                    {copiedIndex === idx ? <>Opening Maps...</> : <><Copy size={16} /> Post This Review</>}
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </main>
                        <footer className="p-4 text-center text-xs text-slate-400 border-t bg-slate-50">
                            Thank you for choosing Nayan Optics
                        </footer>
                    </div>
                </div>
            );
        }

        // Standard Service Button
        function ServiceButton({ icon, label, onClick, iconColor = "bg-blue-50 text-blue-600" }) {
            return (
                <button onClick={onClick} className="w-full p-4 bg-white border border-slate-200 rounded-xl flex items-center justify-between group hover:border-blue-500 hover:shadow-md transition-all active:scale-95">
                    <div className="flex items-center gap-4">
                        <div className={`p-3 rounded-lg transition-colors ${iconColor} group-hover:bg-blue-600 group-hover:text-white`}>
                            {icon}
                        </div>
                        <span className="font-semibold text-slate-700 text-lg">{label}</span>
                    </div>
                    <ChevronRight className="text-slate-300 group-hover:text-blue-500" />
                </button>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
